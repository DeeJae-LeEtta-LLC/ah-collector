runtime: python311
entrypoint: gunicorn -b :$PORT main:app

env_variables:
  OPENSEA_API_KEY: ""
  WALLET_ADDRESS: ""
  ETH_RPC_URL: ""
  DRY_RUN: "true"

automatic_scaling:
  min_idle_instances: 0
  max_idle_instances: 1
  min_pending_latency: 30ms
  max_pending_latency: automatic
  max_concurrent_requests: 10
